# ========================================== #
#      Настройки плагина DeathManager        #
# ========================================== #
# Переводить ли игрока в режим наблюдателя (Spectator) после смерти
hardcore: true
# Вызывать ли эффект удара молнии на месте смерти игрока
light-effect: true
# Выпадение предметов и опыта при смерти (если false, инвентарь просто очистится)
drop: true
# Процент предметов, которые выпадут из инвентаря игрока (от 0 до 100)
drop-percentage: 100
# Эффект крови (красные частицы) при получении урона и самой смерти
blood-effect: true
# Автоматически "прикреплять" камеру убитого игрока к его убийце (работает, если hardcore: true)
auto-target: true
# Настройки голограммы, появляющейся на месте смерти
hologram:
  enabled: true
  # Время отображения голограммы (в секундах)
  duration: 10
  # Текст голограммы. Поддерживает цветовые коды (&) и плейсхолдеры: %player%, %killer%
  lines:
    - "&cЗдесь пал %player%"
    - "&eУбит: &c%killer%"
# Настройки таймера до возрождения (перевод обратно в режим выживания)
respawn-timer:
  enabled: true
  # Время до авто-воскрешения (в секундах)
  time: 5
  # Основной тайтл (большой текст на экране)
  title: "&cВЫ ПОГИБЛИ"
  # Подзаголовок. Поддерживает плейсхолдер %time% - оставшееся время
  subtitle: "&7Ожидание игры... %time%"
# Заменять ли обычные сердечки игрока на "хардкорные" (с трещинками). 
# ВНИМАНИЕ: Требует наличие плагина ProtocolLib на сервере!
hardcore-hearts: true
